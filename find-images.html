<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сбор изображений Monster Vapor</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: #fff; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 20px; }
        .card { background: #16213e; border-radius: 12px; padding: 15px; text-align: center; }
        .card img { width: 100%; height: 200px; object-fit: contain; }
        .card h3 { font-size: 14px; margin: 10px 0; }
        .card a { color: #e94560; font-size: 12px; }
        #status { margin: 20px 0; padding: 15px; background: #2a2a4a; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>🔍 Поиск изображений Monster Vapor</h1>
    <div id="status">Загрузка...</div>
    <div class="grid" id="grid"></div>
    
    <script>
        // Список вкусов для поиска
        const flavors = [
            'Barawolf', 'Barbahybrid', 'Baba Banana', 'Banampus', 'Berry Jack',
            'Big Foot Cola', 'Crappbie', 'Currummy', 'Grape Cola', 'Grapeena',
            'Grapefruit Raspberry', 'Ifritus', 'Jotun Pine', 'Kiwi Apple',
            'Leshberry', 'Limelops', 'Mango King', 'Cola Kong', 'Cola Lemon',
            'Mankicore', 'Manoraur', 'Neelhu', 'Peachansi', 'Pinchezilla',
            'Snakelon', 'Straw Fogler', 'Straw Gona', 'Strawberry Grape',
            'Tropirus', 'Watercream', 'Apple Cranberry', 'Hypnocrank',
            'Catrula', 'Strawnergy Things'
        ];
        
        const grid = document.getElementById('grid');
        const status = document.getElementById('status');
        
        // Используем DuckDuckGo Image Search для поиска картинок
        async function findImage(flavorName) {
            const query = encodeURIComponent(`Monster Vapor ${flavorName} 30ml bottle`);
            
            // Пытаемся найти через proxy
            const urls = [
                `https://www.brusko-world.com/upload/iblock/*/` + flavorName.replace(/ /g, '-') + '.jpg',
                `https://hqd-online-store.ru/image/cache/catalog/products/monster-vapor/${flavorName.replace(/ /g, '-').toLowerCase()}-`,
            ];
            
            return null; // Пока не можем найти автоматически
        }
        
        // Генерируем карточки с SVG заглушками
        let html = '';
        flavors.forEach((flavor, i) => {
            const color = ['#e94560', '#c0392b', '#f1c40f', '#f39c12', '#e74c3c'][i % 5];
            html += `
                <div class="card">
                    <div style="width:100%;height:200px;background:linear-gradient(135deg, ${color}40, ${color}90);display:flex;align-items:center;justify-content:center;border-radius:8px;">
                        <span style="font-size:48px;">💧</span>
                    </div>
                    <h3>${flavor}</h3>
                    <a href="https://www.google.com/search?q=Monster+Vapor+${encodeURIComponent(flavor)}+bottle&tbm=isch" target="_blank">🔍 Найти картинку</a>
                </div>
            `;
        });
        
        grid.innerHTML = html;
        status.innerHTML = `✅ Найдено ${flavors.length} вкусов. Нажмите "🔍 Найти картинку" для поиска изображения каждого вкуса.`;
        
        console.log('Список вкусов:', flavors);
    </script>
</body>
</html>
