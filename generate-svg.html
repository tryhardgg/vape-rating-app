<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Генератор SVG</title>
</head>
<body>
    <h1>Генерация SVG изображений...</h1>
    <div id="status"></div>
    
    <script src="js/data.js"></script>
    <script>
        const flavors = window.MonsterVaporData.flavors;
        const statusDiv = document.getElementById('status');
        
        function generateSVG(name, color) {
            const shortName = name.length > 18 ? name.substring(0, 16) + '...' : name;
            const safeName = name.replace(/[^a-zA-Z0-9]/g, '_');
            
            return `<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-${safeName}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:${color};stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:${color};stop-opacity:0.3" />
    </linearGradient>
    <filter id="glow-${safeName}">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
  </defs>
  <path d="M60 20 L140 20 L150 40 L150 280 Q150 295 100 295 Q50 295 50 280 L50 40 Z" 
        fill="url(#grad-${safeName})" stroke="${color}" stroke-width="2"/>
  <rect x="55" y="100" width="90" height="120" rx="5" 
        fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="100" y="130" text-anchor="middle" font-family="Arial" font-size="10" 
        fill="rgba(255,255,255,0.7)" letter-spacing="2">MONSTER</text>
  <text x="100" y="145" text-anchor="middle" font-family="Arial" font-size="10" 
        fill="rgba(255,255,255,0.7)" letter-spacing="2">VAPOR</text>
  <text x="100" y="175" text-anchor="middle" font-family="Arial" font-size="11" 
        font-weight="bold" fill="#ffffff" filter="url(#glow-${safeName})">${shortName}</text>
  <text x="100" y="70" text-anchor="middle" font-family="Arial" font-size="36" 
        font-weight="bold" fill="rgba(255,255,255,0.2)">M</text>
</svg>`;
        }
        
        let html = '<ul>';
        flavors.forEach(flavor => {
            const svg = generateSVG(flavor.name, flavor.color);
            const filename = flavor.name.replace(/[^a-zA-Z0-9]/g, '_') + '.svg';
            html += `<li><strong>${flavor.name}</strong>: ${filename}</li>`;
        });
        html += '</ul>';
        
        statusDiv.innerHTML = html;
        
        console.log('Сгенерируйте файлы с помощью Node.js или сохраните вручную');
        console.log(JSON.stringify(flavors.map(f => ({
            name: f.name,
            filename: f.name.replace(/[^a-zA-Z0-9]/g, '_') + '.svg',
            color: f.color
        }), null, 2)));
    </script>
</body>
</html>
